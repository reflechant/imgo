name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build -v -o imgo ./cmd/imgo

      - name: Run Tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check Coverage Gate (100% for Core)
        run: |
          # Use awk to calculate total statement coverage for specific files.
          # This handles files with multiple functions correctly.
          check_coverage() {
            local file=$1
            local expected=$2
            # Extract coverage % from go tool cover -func output for the file
            local actual=$(go tool cover -func=coverage.out | grep "$file" | awk '{sum+=$NF; count++} END {if (count > 0) printf "%.1f%%", sum/count}')
            echo "$file coverage: $actual (expected $expected)"
            if [[ "$actual" != "$expected" ]]; then
              echo "ERROR: $file must have $expected coverage."
              exit 1
            fi
          }

          check_coverage "rewrite.go" "100.0%"
          check_coverage "validator.go" "100.0%"

      - name: Upload Coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
