version: "2"

run:
  timeout: 5m

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - godot
    - godox
    - lll
    - tagliatelle
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
