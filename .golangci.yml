version: "2"

run:
  timeout: 5m

linters:
  enable:
    - exhaustive
    - errorlint
    - forcetypeassert
    - predeclared
    - nilerr
    - nilnesserr
    - gochecksumtype
    - asciicheck
    - revive
    - lll
    - modernize
    - intrange
    - exptostd
    - copyloopvar
    - unconvert
    - misspell
  settings:
    exhaustive:
      default-signifies-exhaustive: false
    lll:
      line-length: 120

formatters:
  enable:
    - gofmt
    - goimports
