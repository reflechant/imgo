version: "2"

run:
  timeout: 5m

linters:
  default: all
  settings:
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - generic
  disable:
    - depguard
    - exhaustruct
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - godot
    - godox
    - lll
    - tagliatelle
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
    # Complexity linters are too noisy for AST manipulation and transpiler codebases
    - cyclop
    - gocognit
    - gocyclo
    - maintidx
    - nestif

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
